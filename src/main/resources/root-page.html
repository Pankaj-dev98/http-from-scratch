<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Handwritten HTTP Server</title>
  <style>
      body {
          margin: 0;
          font-family: Arial, Helvetica, sans-serif;
          background: #f4f6f8;
          color: #333;
          display: flex;
          justify-content: center;
          align-items: center;
          min-height: 100vh;
      }

      .container {
          max-width: 700px;
          padding: 2rem;
          background: white;
          border-radius: 12px;
          box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
          text-align: center;
      }

      h1 {
          margin-top: 0;
          color: #2c3e50;
      }

      p {
          font-size: 1.1rem;
          line-height: 1.7;
          margin: 1rem 0;
      }

      code {
          display: inline-block;
          margin-top: 1rem;
          padding: 0.4rem 0.8rem;
          background: #eef2f7;
          border-radius: 6px;
          font-family: Consolas, monospace;
      }
  </style>
</head>
<body>
<div class="container">
  <h1>Hello! 👋</h1>

  <p>Welcome to my <strong>handwritten HTTP server</strong>!</p>

  <p>It is a pleasure to have you here.</p>

  <p>
    The response you're reading has been generated after
    <strong>manually parsing your HTTP request</strong>.
  </p>

  <code>HTTP 200 OK</code>
</div>
</body>
</html>
